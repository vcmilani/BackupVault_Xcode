<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">

  <title>nestVault app icon — variação fundo escuro com hexágono</title>
  <desc>Ícone nestVault com fundo azul escuro, hexágono central com porta circular e ninho em arcos verdes na base.</desc>

  <!-- Background -->
  <rect x="0" y="0" width="680" height="680" fill="rgb(45,55,72)"/>

  <!-- Conteúdo central escalado proporcionalmente -->
  <g transform="translate(340 340) scale(1.22) translate(-340 -340)">

    <!-- Ninho -->
    <path d="M148,520 Q340,635 532,520" stroke="rgb(72,187,120)" stroke-width="30" fill="none" stroke-linecap="round"/>
    <path d="M188,478 Q340,588 492,478" stroke="rgb(72,187,120)" stroke-width="22" fill="none" stroke-linecap="round"/>
    <path d="M232,440 Q340,545 448,440" stroke="rgb(72,187,120)" stroke-width="15" fill="none" stroke-linecap="round"/>

    <!-- Hexágono -->
    <polygon points="340,137 477,216 477,374 340,453 203,374 203,216" fill="rgb(26,32,44)"/>
    <polygon points="340,152 464,227 464,363 340,438 216,363 216,227"
             fill="none" stroke="rgb(74,85,104)" stroke-width="7"/>

    <!-- Porta -->
    <circle cx="340" cy="295" r="95" fill="rgb(45,55,72)"/>
    <circle cx="340" cy="295" r="95" fill="none" stroke="rgb(74,85,104)" stroke-width="8"/>

    <!-- Tiques cardinais -->
    <line x1="340" y1="200" x2="340" y2="222" stroke="rgb(226,232,240)" stroke-width="11" stroke-linecap="round"/>
    <line x1="340" y1="368" x2="340" y2="390" stroke="rgb(226,232,240)" stroke-width="11" stroke-linecap="round"/>
    <line x1="245" y1="295" x2="267" y2="295" stroke="rgb(226,232,240)" stroke-width="11" stroke-linecap="round"/>
    <line x1="413" y1="295" x2="435" y2="295" stroke="rgb(226,232,240)" stroke-width="11" stroke-linecap="round"/>

    <!-- Tiques diagonais -->
    <line x1="273" y1="228" x2="287" y2="242" stroke="rgb(226,232,240)" stroke-width="7" stroke-linecap="round"/>
    <line x1="393" y1="348" x2="407" y2="362" stroke="rgb(226,232,240)" stroke-width="7" stroke-linecap="round"/>
    <line x1="407" y1="228" x2="393" y2="242" stroke="rgb(226,232,240)" stroke-width="7" stroke-linecap="round"/>
    <line x1="273" y1="362" x2="287" y2="348" stroke="rgb(226,232,240)" stroke-width="7" stroke-linecap="round"/>

    <!-- Centro do dial -->
    <circle cx="340" cy="295" r="30" fill="rgb(26,32,44)"/>
    <circle cx="340" cy="295" r="16" fill="rgb(56,178,172)"/>
    <circle cx="340" cy="295" r="7" fill="#1A202C"/>

    <!-- Badge -->
    <circle cx="477" cy="200" r="40" fill="#2D3748"/>
    <circle cx="477" cy="200" r="30" fill="rgb(56,178,172)"/>
    <polyline points="463,200 473,212 492,187"
              fill="none"
              stroke="#F0FFF4"
              stroke-width="8"
              stroke-linecap="round"
              stroke-linejoin="round"/>

  </g>

</svg>